name: Sync Aleo scope source

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: aleo-scope-source-sync
  cancel-in-progress: false

jobs:
  sync-source:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout scan repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Refresh vendored upstream source
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT

          git clone --depth 1 --branch staging https://github.com/ProvableHQ/snarkVM.git "$tmp/snarkVM"
          git clone --depth 1 --branch staging https://github.com/ProvableHQ/snarkOS.git "$tmp/snarkOS"

          rm -rf core/snarkVM core/snarkOS
          mkdir -p core/snarkVM core/snarkOS
          tar -C "$tmp/snarkVM" --exclude=.git -cf - . | tar -C core/snarkVM -xf -
          tar -C "$tmp/snarkOS" --exclude=.git -cf - . | tar -C core/snarkOS -xf -

          snarkvm_sha="$(git -C "$tmp/snarkVM" rev-parse HEAD)"
          snarkos_sha="$(git -C "$tmp/snarkOS" rev-parse HEAD)"
          python3 - "$snarkvm_sha" "$snarkos_sha" <<'PY'
          from pathlib import Path
          import sys

          snarkvm_sha, snarkos_sha = sys.argv[1:3]
          path = Path("SCOPE.md")
          text = path.read_text()
          lines = []
          for line in text.splitlines():
              if line.startswith("- snarkVM:"):
                  line = f"- snarkVM: `core/snarkVM` at upstream `staging` commit `{snarkvm_sha}`"
              elif line.startswith("- snarkOS:"):
                  line = f"- snarkOS: `core/snarkOS` at upstream `staging` commit `{snarkos_sha}`"
              lines.append(line)
          path.write_text("\n".join(lines) + "\n")
          PY
          git add core/snarkVM core/snarkOS SCOPE.md

      - name: Commit updates
        run: |
          if git diff --cached --quiet && git diff --quiet; then
            echo "No Aleo scope updates."
            exit 0
          fi
          git status --short
          git commit -m "Sync Aleo scope source"
          git push
